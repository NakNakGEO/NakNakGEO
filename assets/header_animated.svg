  <g class="twinkleB"><circle cx="146" cy="262" r="1.3" fill="#E0F2FE"/><circle cx="256" cy="286" r="1.4" fill="#C4B5FD"/><circle cx="380" cy="298" r="1.2" fill="#A5F3FC"/><circle cx="925" cy="276" r="1.7" fill="#DDD6FE"/><circle cx="1048" cy="260" r="1.2" fill="#BAE6FD"/><circle cx="1148" cy="292" r="1.4" fill="#E0F2FE"/></g>
  <rect x="-1220" y="0" width="220" height="340" fill="url(#lineGlow)" opacity="0.12" class="scan"/>
  <g class="driftA" opacity="0.56"><path d="M54 270C156 236 214 269 301 231C400 187 490 212 579 194C673 175 734 192 830 171C930 149 1037 161 1140 112" stroke="#1D4ED8" stroke-opacity="0.58" stroke-width="1"/><path d="M60 286C166 255 229 290 323 253C424 215 516 233 607 216C701 198 768 214 862 191C964 168 1057 176 1135 145" stroke="url(#lineGlow)" stroke-width="1.7"/></g>
  <g class="driftB" opacity="0.34" stroke="url(#accent)" stroke-width="1.2"><path d="M100 140H176L204 112H296"/><path d="M904 114H970L1000 85H1078"/><path d="M104 220H174L204 248H272"/><path d="M930 228H1000L1035 258H1095"/></g>
  <g opacity="0.68"><rect x="82" y="128" width="18" height="18" rx="4" stroke="#22D3EE" stroke-opacity="0.45"/><rect x="1073" y="73" width="16" height="16" rx="3" stroke="#A78BFA" stroke-opacity="0.45"/><rect x="1080" y="250" width="14" height="14" rx="3" stroke="#60A5FA" stroke-opacity="0.45"/><circle cx="296" cy="112" r="3" fill="#22D3EE"/><circle cx="1000" cy="85" r="3" fill="#A78BFA"/><circle cx="204" cy="248" r="3" fill="#60A5FA"/><circle cx="1035" cy="258" r="3" fill="#22D3EE"/></g>
  <g><circle cx="607" cy="216" r="4" fill="#60A5FA"/><circle cx="607" cy="216" r="15" fill="#60A5FA" fill-opacity="0.22" filter="url(#softBlur)" class="pulse"/><circle cx="862" cy="191" r="4" fill="#A78BFA"/><circle cx="323" cy="253" r="3" fill="#22D3EE"/></g>
  <g text-anchor="middle"><text x="600" y="154" fill="url(#accent)" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="58" font-weight="800" letter-spacing="8" filter="url(#textGlow)" class="titleGlow">NAKNAKGEO</text><text x="600" y="205" fill="#E5E7EB" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600" letter-spacing="2.8">SOFTWARE ENGINEERING · AI SYSTEMS · INFRASTRUCTURE · AUTOMATION</text><line x1="335" y1="229" x2="865" y2="229" stroke="url(#lineGlow)" stroke-width="2.2" stroke-linecap="round"/><text x="600" y="264" fill="#94A3B8" font-family="JetBrains Mono,Consolas,monospace" font-size="15" letter-spacing="1.3">BUILDING RELIABLE SYSTEMS, AI TOOLS, AND INFRASTRUCTURE</text></g>
  <rect x="1" y="1" width="1198" height="338" rx="23" stroke="url(#accent)" stroke-opacity="0.24" stroke-width="2"/>
</svg>
