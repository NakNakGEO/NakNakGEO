<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06111F"/>
      <stop offset="55%" stop-color="#0B1631"/>
      <stop offset="100%" stop-color="#1A1033"/>
    </linearGradient>
    <linearGradient id="accent" x1="240" y1="80" x2="980" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="55%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="30%" stop-color="#22D3EE" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#A78BFA" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(160 170) rotate(12) scale(420 260)">
      <stop stop-color="#0891B2" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#0891B2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 70) rotate(140) scale(380 270)">
      <stop stop-color="#7C3AED" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <pattern id="microGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#93C5FD" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <pattern id="majorGrid" width="84" height="84" patternUnits="userSpaceOnUse">
      <path d="M84 0H0V84" fill="none" stroke="#A78BFA" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <filter id="softBlur" x="-25%" y="-25%" width="150%" height="150%"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="textGlow" x="-25%" y="-80%" width="150%" height="260%"><feGaussianBlur stdDeviation="6" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .twinkleA{animation:twinkleA 3.2s ease-in-out infinite}.twinkleB{animation:twinkleB 4.4s ease-in-out infinite}.pulse{animation:pulse 2.8s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.driftA{animation:driftA 14s ease-in-out infinite alternate}.driftB{animation:driftB 16s ease-in-out infinite alternate}.scan{animation:scan 7s linear infinite}.titleGlow{animation:titleGlow 3.8s ease-in-out infinite}.subtleMove{animation:subtleMove 12s ease-in-out infinite alternate}
      @keyframes twinkleA{0%,100%{opacity:.25}50%{opacity:.95}}@keyframes twinkleB{0%,100%{opacity:.35}50%{opacity:.8}}@keyframes pulse{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:.75;transform:scale(1.16)}}@keyframes driftA{0%{transform:translate(-8px,0)}100%{transform:translate(12px,-4px)}}@keyframes driftB{0%{transform:translate(10px,0)}100%{transform:translate(-10px,5px)}}@keyframes scan{0%{transform:translateX(-1220px);opacity:0}12%{opacity:.35}50%{opacity:.2}88%{opacity:.35}100%{transform:translateX(1220px);opacity:0}}@keyframes titleGlow{0%,100%{opacity:.96}50%{opacity:1}}@keyframes subtleMove{0%{transform:translateY(0)}100%{transform:translateY(-3px)}}
    </style>
  </defs>
  <rect width="1200" height="340" rx="24" fill="url(#bg)"/><rect width="1200" height="340" rx="24" fill="url(#microGrid)"/><rect width="1200" height="340" rx="24" fill="url(#majorGrid)"/><rect width="1200" height="340" rx="24" fill="url(#glowLeft)" class="subtleMove"/><rect width="1200" height="340" rx="24" fill="url(#glowRight)" class="subtleMove"/>
